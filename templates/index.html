<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Parishiksha — AI Course Assistant</title>
  <meta name="description" content="Parishiksha Retrieval Assistant: A LangGraph-powered course chatbot with real-time graph execution trace." />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="app-container">
    <!-- ─── Header ─── -->
    <header class="app-header">
      <div class="logo">
        <span class="logo-icon">🎓</span>
        <h1>Parishiksha</h1>
        <span class="badge">LangGraph RAG</span>
      </div>
      <p class="subtitle">AI/ML Course Retrieval Assistant — powered by multi-agent routing</p>
    </header>

    <!-- ─── Graph Trace Panel ─── -->
    <section class="graph-panel" id="graphPanel">
      <h2 class="panel-title">
        <span class="pulse-dot"></span>
        Graph Execution Trace
      </h2>
      <div class="graph-container">
        <svg viewBox="0 0 800 160" class="graph-svg" id="graphSvg">
          <!-- Edges -->
          <line x1="160" y1="80" x2="295" y2="40" class="edge" id="edge-router-retrieve" />
          <line x1="160" y1="80" x2="295" y2="120" class="edge" id="edge-router-direct" />
          <line x1="505" y1="40" x2="620" y2="80" class="edge" id="edge-retrieve-generate" />
          <line x1="505" y1="120" x2="620" y2="80" class="edge" id="edge-direct-generate" />
          <line x1="40" y1="80" x2="95" y2="80" class="edge edge-active" />
          <line x1="705" y1="80" x2="760" y2="80" class="edge" id="edge-generate-end" />

          <!-- Start node -->
          <circle cx="40" cy="80" r="14" class="node node-start" />
          <text x="40" y="84" class="node-label-small">▶</text>

          <!-- Router -->
          <rect x="95" y="50" width="130" height="60" rx="12" class="node node-router" id="node-router" />
          <text x="160" y="76" class="node-label">🔀 Router</text>
          <text x="160" y="95" class="node-sublabel">classify query</text>

          <!-- Retrieve -->
          <rect x="295" y="10" width="210" height="60" rx="12" class="node node-retrieve" id="node-retrieve" />
          <text x="400" y="36" class="node-label">📚 Retrieve</text>
          <text x="400" y="55" class="node-sublabel">pull course notes</text>

          <!-- Direct Answer -->
          <rect x="295" y="90" width="210" height="60" rx="12" class="node node-direct" id="node-direct_answer" />
          <text x="400" y="116" class="node-label">⚡ Direct Answer</text>
          <text x="400" y="135" class="node-sublabel">skip retrieval</text>

          <!-- Generate -->
          <rect x="620" y="50" width="140" height="60" rx="12" class="node node-generate" id="node-generate" />
          <text x="690" y="76" class="node-label">✨ Generate</text>
          <text x="690" y="95" class="node-sublabel">final answer</text>

          <!-- End node -->
          <circle cx="760" cy="80" r="14" class="node node-end" id="node-end" />
          <text x="760" y="84" class="node-label-small">■</text>
        </svg>
      </div>
      <div class="trace-log" id="traceLog">
        <div class="trace-placeholder">Ask a question to see the graph execution trace…</div>
      </div>
    </section>

    <!-- ─── Chat Panel ─── -->
    <section class="chat-panel">
      <div class="messages" id="messages">
        <div class="message bot">
          <div class="message-avatar">🎓</div>
          <div class="message-content">
            <p>Hi! I'm <strong>Parishiksha</strong>, your AI/ML course assistant.</p>
            <p>Ask me about any topic from Weeks 1–10, or try:</p>
            <div class="suggestions">
              <button class="suggestion" onclick="askSuggestion(this)">What did we cover in Week 9?</button>
              <button class="suggestion" onclick="askSuggestion(this)">What is 2 + 2?</button>
              <button class="suggestion" onclick="askSuggestion(this)">Explain the attention mechanism</button>
            </div>
          </div>
        </div>
      </div>
      <form class="input-area" id="chatForm">
        <input type="text" id="queryInput" placeholder="Ask about the course…" autocomplete="off" />
        <button type="submit" id="sendBtn">
          <span class="send-icon">➤</span>
        </button>
      </form>
    </section>
  </div>

  <script src="/static/script.js"></script>
</body>
</html>
